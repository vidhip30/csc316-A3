<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Spotify Visualization</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">

</head>

<body>
<div class="container">

    <h2 class="text-center mt-3">🎵 How Have Songs Changed Over Time?</h2>

    <div id="instructions" class="text-center">
        Hover to explore songs, click to search on Spotify, hover over song and pinch to zoom, and click genres to filter.
    </div>

    <div class="d-flex flex-column align-items-center mb-3">

        <div class="d-flex align-items-center gap-2 mb-2">

            <input type="text" id="searchBox"
                   placeholder="Search song or artist"
                   class="form-control"
                   style="width: 250px;">

            <button id="resetZoom" class="btn btn-secondary">Reset Zoom</button>

            <button id="playYears" class="btn btn-primary">▶ Play</button>

        </div>

        <div class="d-flex align-items-center gap-2 mb-2">
            <label class="mb-0">Year: <span id="yearValue">2000</span></label>
            <input type="range" id="yearSlider" min="2000" max="2020" value="2000" style="width: 300px;">
        </div>

        <div class="d-flex align-items-center gap-2 mb-2 ">
            <label for="xAxisSelect">X-Axis:</label>
            <select id="xAxisSelect" class="form-select form-select-sm">
                <option value="tempo" selected>Tempo</option>
                <option value="danceability">Danceability</option>
                <option value="energy">Energy</option>
                <option value="loudness">Loudness</option>
                <option value="speechiness">Speechiness</option>
                <option value="acousticness">Acousticness</option>
                <option value="liveness">Liveness</option>
                <option value="valence">Valence</option>
                <option value="duration_ms">Duration (ms)</option>
            </select>

            <label for="yAxisSelect">Y-Axis:</label>
            <select id="yAxisSelect" class="form-select form-select-sm">
                <option value="duration_ms" selected>Duration (ms)</option>
                <option value="tempo">Tempo</option>
                <option value="danceability">Danceability</option>
                <option value="energy">Energy</option>
                <option value="loudness">Loudness</option>
                <option value="speechiness">Speechiness</option>
                <option value="acousticness">Acousticness</option>
                <option value="liveness">Liveness</option>
                <option value="valence">Valence</option>
            </select>
        </div>

    </div>

    <div class="d-flex align-items-start gap-3">

        <div id="chart"></div>

        <div id="legend">
            <h5 style="font-size:14px; margin-bottom:8px;">Genres</h5>
        </div>

    </div>

    <div id="dashboard" class="stats-container">

        <div class="stat-card">
            <div class="stat-title">Avg Tempo</div>
            <div class="stat-value" id="stat-tempo">-</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Avg Duration</div>
            <div class="stat-value" id="stat-duration">-</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Popularity</div>
            <div class="stat-value" id="stat-popularity">-</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Top Song</div>
            <div class="stat-value" id="stat-song">-</div>
        </div>

    </div>

    <div id="tooltip"></div>

</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="js/main.js"></script>

</body>
</html>
